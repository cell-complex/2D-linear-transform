<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>2D Linear Transform</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            background: #111;
        }

        .container {
            display: flex;
            align-items: flex-start;
        }

        canvas {
            background: #fff;
            border-left: 100px solid #111;
            margin: 0px;
        }

        .rightBox {
            display: flex;
            flex-direction: column;
            color: white;
            font-size: 20px;
            width: 250px;
            padding: 30px;
            padding-top:60px;
        }

        .btnBox {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            /* ボタン間の間隔を均等に */
            align-items: center;
            /* 縦中央揃え */
            width: 100%;
            gap: 10px;
            /* ボタン間の隙間 */
            padding: 0 10px;
            /* 左右に余白を追加 */
        }

        button {
            flex: 1;
            /* ボタンを均等に広げる */
            padding: 10px;
            height: 40px;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div class="container">
        <canvas id="c" width="600" height="600"></canvas>
        <div class="rightBox">
            <div class="btnBox">
                <button id="snapToggle">Snap: ON</button>
                <button id="resetBtn">Reset</button>
            </div>
            <div id="info"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");

        const origin = { x: 300, y: 300 };
        const scale = 40;
        const N = 10;

        const gridSize = 1;

        const initialV1 = { x: 1, y: 0 };
        const initialV2 = { x: 0, y: 1 };

        let v1 = initialV1;
        let v2 = initialV2;

        let dragging = null;

        // 座標変換（数学→画面）
        function toScreen(p) {
            return {
                x: origin.x + p.x * scale,
                y: origin.y - p.y * scale
            };
        }

        // 画面→数学
        function toWorld(p) {
            return {
                x: (p.x - origin.x) / scale,
                y: (origin.y - p.y) / scale
            };
        }

        function drawLine(p, q, color = "black", width = 1) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = width;

            let p1 = toScreen(p);
            let p2 = toScreen(q);

            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
        }

        // グリッド描画
        function drawFixedGrid() {
            drawLine({ x: -N, y: 0 }, { x: N, y: 0 }, "black", 2);
            drawLine({ x: 0, y: -N }, { x: 0, y: N }, "black", 2);

            for (let i = -N; i <= N; i++) {
                let t = i * gridSize;
                let G = N * gridSize;
                drawLine({ x: t, y: -G }, { x: t, y: G }, "gray", 1);
                drawLine({ x: -G, y: t }, { x: G, y: t }, "gray", 1);
            }
        }

        // 線形変換
        function transform(p) {
            return {
                x: p.x * v1.x + p.y * v2.x,
                y: p.x * v1.y + p.y * v2.y
            };
        }

        // ===== 固有値・固有空間 =====
        function getEigenData() {
            const a = v1.x;
            const b = v2.x;
            const c = v1.y;
            const d = v2.y;

            const tr = a + d;
            const det = a * d - b * c;
            const D = tr * tr - 4 * det;

            if (D < 0) return { type: "none" };

            const sqrtD = Math.sqrt(D);
            const l1 = (tr + sqrtD) / 2;
            const l2 = (tr - sqrtD) / 2;

            function eigenvector(lambda) {
                const m11 = a - lambda;
                const m12 = b;
                const m21 = c;
                const m22 = d - lambda;

                if (Math.abs(m11) + Math.abs(m12) > 1e-6) {
                    return { x: -m12, y: m11 };
                } else {
                    return { x: -m22, y: m21 };
                }
            }

            if (Math.abs(l1 - l2) < 1e-6) {
                return {
                    type: "double",
                    lambda: l1,
                    vec: eigenvector(l1)
                };
            }

            return {
                type: "distinct",
                l1, l2,
                v1: eigenvector(l1),
                v2: eigenvector(l2)
            };
        }

        // 固有空間（直線）描画
        function drawEigenLine(v, color) {
            const len = 20;
            drawLine(
                { x: -len * v.x, y: -len * v.y },
                { x: len * v.x, y: len * v.y },
                color,
                2
            );
        }

        function drawGrid() {
            drawLine(transform({ x: -N, y: 0 }), transform({ x: N, y: 0 }), "red", 3);
            drawLine(transform({ x: 0, y: -N }), transform({ x: 0, y: N }), "blue", 3);

            for (let i = -N; i <= N; i++) {
                let t = i * gridSize;
                let G = N * gridSize;
                drawLine(transform({ x: -G, y: t }), transform({ x: G, y: t }), "red", 1);
                drawLine(transform({ x: t, y: -G }), transform({ x: t, y: G }), "blue", 1);
            }
        }

        function drawArrowHead(v, color) {
            const p = toScreen(v);
            const o = toScreen({ x: 0, y: 0 });

            // 方向ベクトル（画面座標）
            const dx = p.x - o.x;
            const dy = p.y - o.y;
            const len = Math.hypot(dx, dy);

            if (len === 0) return;

            // 単位ベクトル
            const ux = dx / len;
            const uy = dy / len;

            // 垂直ベクトル
            const px = -uy;
            const py = ux;

            const size = 20;   // 矢じりの長さ
            const width = 6;   // 矢じりの幅

            // 三角形の3点
            const tip = { x: p.x, y: p.y };
            const base = {
                x: p.x - ux * size,
                y: p.y - uy * size
            };

            const left = {
                x: base.x + px * width,
                y: base.y + py * width
            };

            const right = {
                x: base.x - px * width,
                y: base.y - py * width
            };

            ctx.beginPath();
            ctx.moveTo(tip.x, tip.y);
            ctx.lineTo(left.x, left.y);
            ctx.lineTo(right.x, right.y);
            ctx.closePath();

            ctx.fillStyle = color;
            ctx.fill();
        }

        // ベクトル描画
        function drawVector(v, color) {
            drawLine({ x: 0, y: 0 }, v, color, 3);

            // 先端
            drawArrowHead(v, color);

            const p = toScreen(v);
            ctx.beginPath();
            ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawParallelogram() {
            const p0 = toScreen({ x: 0, y: 0 });
            const p1 = toScreen(v1);
            const p2 = toScreen(v2);
            const p3 = toScreen({ x: v1.x + v2.x, y: v1.y + v2.y });

            ctx.beginPath();
            ctx.moveTo(p0.x, p0.y);
            ctx.lineTo(p1.x, p1.y);
            ctx.lineTo(p3.x, p3.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.closePath();

            const det = v1.x * v2.y - v1.y * v2.x;

            ctx.fillStyle = det >= 0
                ? "rgba(200,0,0,0.2)"
                : "rgba(0,0,200,0.2)";
            // ctx.fillStyle = 
            // "rgba(0, 200, 0, 0.3)";
            ctx.fill();
        }

        function updateInfo() {
            const det = v1.x * v2.y - v1.y * v2.x;
            const eig = getEigenData();

            let text = `
\\[
A =
\\begin{pmatrix}
${v1.x.toFixed(2)} & ${v2.x.toFixed(2)} \\\\
${v1.y.toFixed(2)} & ${v2.y.toFixed(2)}
\\end{pmatrix}
\\]

\\[
\\det A = ${det.toFixed(2)}
\\]
`;

            if (eig.type === "none") {
                text += `\\[ \\text{実固有値なし} \\]`;
            }

            if (eig.type === "distinct") {
                text += `
\\[
\\color{limegreen}{\\lambda_1 = ${eig.l1.toFixed(2)}}
\\]

\\[
\\color{limegreen}{V(\\lambda_1) = \\mathrm{Span}
\\begin{pmatrix}
${eig.v1.x.toFixed(2)} \\\\
${eig.v1.y.toFixed(2)}
\\end{pmatrix}
            }
\\]

\\[
\\color{orange}{\\lambda_2 = ${eig.l2.toFixed(2)}}
\\]

\\[
\\color{orange}{V(\\lambda_2) = \\mathrm{Span}
\\begin{pmatrix}
${eig.v2.x.toFixed(2)} \\\\
${eig.v2.y.toFixed(2)}
\\end{pmatrix}
            }
\\]
`;
            }

            if (eig.type === "double") {
                text += `
\\[
\\color{limegreen}{\\lambda = ${eig.lambda.toFixed(2)}}
\\]

\\[
\\color{limegreen}{V(\\lambda) = \\mathrm{Span}
\\begin{pmatrix}
${eig.vec.x.toFixed(2)} \\\\
${eig.vec.y.toFixed(2)}
\\end{pmatrix}
            }
\\]
`;
            }

            info.innerHTML = text;
            MathJax.typesetPromise([info]);
        }

        // 描画
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawFixedGrid();
            drawParallelogram();
            drawGrid();

            const eig = getEigenData();
            if (eig.type === "distinct") {
                drawEigenLine(eig.v1, "green");
                drawEigenLine(eig.v2, "#FF6E00");
            }
            if (eig.type === "double") {
                drawEigenLine(eig.vec, "green");
            }
            drawVector(v1, "red");
            drawVector(v2, "blue");
            updateInfo();
        }

        function snapToGrid(p, threshold = gridSize * 0.25) {
            const gx = Math.round(p.x / gridSize) * gridSize;
            const gy = Math.round(p.y / gridSize) * gridSize;

            const dx = p.x - gx;
            const dy = p.y - gy;
            const dist = Math.hypot(dx, dy);

            if (dist < threshold) {
                return { x: gx, y: gy };
            } else {
                return p;
            }
        }

        let snapEnabled = true;
        const snapButton = document.getElementById("snapToggle");

        snapButton.addEventListener("click", () => {
            snapEnabled = !snapEnabled;  // ON/OFF を反転
            snapButton.innerText = snapEnabled ? "Snap: ON" : "Snap: OFF";  // 表示更新
        });

        const resetBtn = document.getElementById("resetBtn");

        resetBtn.addEventListener("click", () => {
            v1 = { ...initialV1 };
            v2 = { ...initialV2 };
            draw();
        });

        // マウスイベント
        canvas.addEventListener("mousedown", (e) => {
            const mouse = { x: e.offsetX, y: e.offsetY };

            const p1 = toScreen(v1);
            const p2 = toScreen(v2);

            const dist1 = Math.hypot(mouse.x - p1.x, mouse.y - p1.y);
            const dist2 = Math.hypot(mouse.x - p2.x, mouse.y - p2.y);

            if (dist1 < 10) dragging = "v1";
            else if (dist2 < 10) dragging = "v2";
        });

        canvas.addEventListener("mousemove", (e) => {
            if (!dragging) return;

            const mouse = { x: e.offsetX, y: e.offsetY };
            let world = toWorld(mouse);

            if (snapEnabled) {
                world = snapToGrid(world);
            }

            if (dragging === "v1") v1 = world;
            if (dragging === "v2") v2 = world;

            draw();
        });

        canvas.addEventListener("mouseup", () => dragging = null);
        canvas.addEventListener("mouseleave", () => dragging = null);

        // 初期描画
        draw();
    </script>
</body>

</html>
